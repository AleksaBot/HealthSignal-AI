services:
  - type: web
    name: healthsignal-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./healthsignal.db
      - key: SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
